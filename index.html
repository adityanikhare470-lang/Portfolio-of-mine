<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aditya Nikhare | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>

<body>

<div id="particles-js"></div>

<nav>
  <h2 class="logo">Aditya</h2>
  <ul>
    <li><a href="#hero">Home</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero" class="hero">
  <div class="left glass">
    <h1>Hello, I'm</h1>
    <h1 class="name">Aditya Nikhare</h1>
    <h2><span id="typing"></span></h2>

    <p>
      I build clean, fast, and beautiful web experiences.
    </p>

    <button class="btn1">View Projects →</button>
  </div>

  <div class="right">
    <div class="cube">
      <div class="face front"></div>
      <div class="face back"></div>
      <div class="face leftf"></div>
      <div class="face rightf"></div>
      <div class="face top"></div>
      <div class="face bottom"></div>
    </div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="projects">
  <h1>My Projects</h1>

  <div class="project-container">

    <div class="card">
      <h2>Portfolio Website</h2>
      <p>Modern responsive personal portfolio</p>
    </div>

    <div class="card">
      <h2>AI Chat App</h2>
      <p>ChatGPT-like app using API</p>
    </div>

    <div class="card">
      <h2>To-Do App</h2>
      <p>Task manager with local storage</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h1>Contact Me</h1>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message"></textarea>
    <button type="submit" class="btn1">Send Message</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
